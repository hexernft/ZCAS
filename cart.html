<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cart | ZCAS TastyBites</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bubblegum-pink: #FF6B9D;
      --cream-white: #FFF8F0;
      --chocolate-brown: #5D4037;
      --golden-yellow: #FFD93D;
      --peach: #FFDAB9;
      --charcoal: #4A4A4A;
      --light-pink: #FFF5F7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Quicksand", sans-serif;
      background: var(--light-pink);
      color: var(--charcoal);
      min-height: 100vh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    nav {
      position: sticky;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      box-shadow: 0 2px 20px rgba(255, 107, 157, 0.1);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-zcas {
      font-family: "Fredoka One", cursive;
      font-size: 1.8rem;
      color: var(--bubblegum-pink);
      letter-spacing: 2px;
    }

    .logo-tastybites {
      font-family: "Pacifico", cursive;
      font-size: 1.4rem;
      color: var(--chocolate-brown);
    }

    .btn-order {
      background: linear-gradient(135deg, var(--bubblegum-pink), var(--peach));
      color: white;
      padding: 0.85rem 2.2rem;
      border-radius: 999px;
      font-weight: 700;
      box-shadow: 0 10px 28px rgba(255, 107, 157, 0.28);
    }

    .hero {
      padding: 5rem 5% 3rem;
      text-align: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 107, 157, 0.18), transparent 24%),
        radial-gradient(circle at 80% 30%, rgba(255, 217, 61, 0.22), transparent 24%),
        linear-gradient(135deg, var(--light-pink), var(--cream-white));
    }

    .hero-badge {
      display: inline-block;
      background: var(--golden-yellow);
      color: var(--chocolate-brown);
      padding: 0.5rem 1.5rem;
      border-radius: 999px;
      font-weight: 800;
      margin-bottom: 1.3rem;
    }

    h1 {
      font-family: "Pacifico", cursive;
      font-size: 4rem;
      color: var(--chocolate-brown);
      text-shadow: 3px 3px 0 var(--peach);
      margin-bottom: 1rem;
    }

    .hero p {
      max-width: 720px;
      margin: 0 auto;
      line-height: 1.7;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .cart-section {
      padding: 4rem 5%;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 2.8rem;
      }

      .logo-icon {
        width: 48px;
        height: 48px;
      }

      .logo-zcas {
        font-size: 1.4rem;
      }

      .logo-tastybites {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>
  <nav>
    <a href="index.html" class="logo-container">
      <div class="logo-icon">
        <svg viewBox="0 0 100 100" width="60" height="60">
          <line x1="50" y1="80" x2="50" y2="50" stroke="#B76E79" stroke-width="4" stroke-linecap="round"/>
          <path d="M 30 50 Q 20 35 35 35 Q 50 20 65 35 Q 80 35 70 50 Q 50 65 30 50"
                fill="none" stroke="#FF6B9D" stroke-width="3" stroke-linecap="round"/>
          <circle cx="25" cy="40" r="2" fill="#FFD93D"/>
          <circle cx="75" cy="35" r="2" fill="#FFD93D"/>
          <circle cx="30" cy="25" r="1.5" fill="#FFD93D"/>
          <circle cx="70" cy="45" r="1.5" fill="#FFD93D"/>
        </svg>
      </div>

      <div class="logo-text">
        <span class="logo-zcas">ZCAS</span>
        <span class="logo-tastybites">TastyBites</span>
      </div>
    </a>

    <a href="menu/index.html" class="btn-order">Back to Menu</a>
  </nav>

  <header class="hero">
    <div class="hero-badge">Your Cart</div>
    <h1>Review Your Treats</h1>
    <p>
      Check your selected items, adjust quantities, and send the order summary to ZCAS TastyBites on WhatsApp.
    </p>
  </header>

  <main class="cart-section">
    <div id="zcasCartRoot"></div>
  </main>

  
<script src="cart-system.js"></script>
</body>
</html>
