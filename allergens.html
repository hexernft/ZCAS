<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Allergen Info | ZCAS TastyBites</title>
  <meta http-equiv="refresh" content="0; url=contact.html">

<style id="zcasFinalCleanCss">
  body,
  a,
  button,
  input,
  textarea,
  select {
    cursor: url("cupcake-cursor.svg") 4 4, auto !important;
  }

  .floating-item {
    display: none !important;
  }

  .btn-order,
  .btn,
  .main-btn {
    text-transform: none !important;
    letter-spacing: 0 !important;
  }
</style>


<style id="zcasProductImageFix">
  /* Product image sizing fix */
  .product-card img,
  .menu-card img,
  .treat-card img,
  .item-card img,
  .card img {
    width: 100% !important;
    height: 230px !important;
    object-fit: cover !important;
    object-position: center !important;
    display: block !important;
    border-radius: 24px 24px 0 0 !important;
  }

  .product-image,
  .menu-image,
  .treat-image,
  .card-image {
    height: 230px !important;
    overflow: hidden !important;
    border-radius: 24px 24px 0 0 !important;
  }

  .product-card,
  .menu-card,
  .treat-card {
    overflow: hidden !important;
  }

  @media (max-width: 700px) {
    .product-card img,
    .menu-card img,
    .treat-card img,
    .item-card img,
    .card img,
    .product-image,
    .menu-image,
    .treat-image,
    .card-image {
      height: 190px !important;
    }
  }
</style>

</head>
<body>
  <p>Redirecting to contact page for allergen enquiries...</p>
  <p><a href="contact.html">Click here if you are not redirected.</a></p>






<script src="cart-system.js"></script>
</body>
</html>
